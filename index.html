<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FFFFFF;
    --surface: #FFFFFF;
    --border: #E8E6E0;
    --text-primary: #1C1B18;
    --text-secondary: #6B6860;
    --text-muted: #9E9C97;
    --accent: #5C52D5;
    --accent-light: #EEECfB;
    --accent-hover: #4A41BE;
    --tag-bg: #F0EFF9;
    --tag-color: #5C52D5;
    --custom-tag: #FFF0E6;
    --custom-tag-color: #D4500A;
    --radius: 12px;
    --radius-sm: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
    --font-cn: -apple-system, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-cn);
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* ── Page Header ── */
  .page-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 60px 32px 36px;
    text-align: center;
  }

  .site-title {
    font-size: 40px;
    font-weight: 500;
    letter-spacing: -0.8px;
    color: var(--text-primary);
    margin-bottom: 28px;
    line-height: 1.2;
  }

  .term-count {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 400;
    margin-left: 10px;
  }

  /* ── Search ── */
  .search-wrap {
    width: 100%;
    max-width: 560px;
    position: relative;
  }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    pointer-events: none;
    width: 16px;
    height: 16px;
  }

  .search-input {
    width: 100%;
    height: 44px;
    border: 1.5px solid #666666;
    border-radius: 100px;
    padding: 0 40px 0 40px;
    font-size: 14px;
    font-family: var(--font-cn);
    background: transparent;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }

  .search-input::placeholder { color: var(--text-muted); }

  .search-input:focus {
    border-color: #000000;
    background: transparent;
  }

  .search-clear {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--text-muted);
    color: white;
    border: none;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    line-height: 1;
    padding: 0;
    transition: background 0.15s;
  }

  .search-clear:hover { background: var(--text-secondary); }
  .search-clear.visible { display: flex; }

  /* ── Main ── */
  .main-content {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px 120px;
  }

  /* ── Category Tabs ── */
  .category-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 60px;
    align-items: center;
    justify-content: center;
  }

  .cat-btn {
    height: 34px;
    padding: 0 16px;
    border-radius: 100px;
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--text-secondary);
    font-size: 13px;
    font-family: var(--font-cn);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .cat-btn .cat-count {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .cat-btn:hover {
    border-color: #000000;
    color: #000000;
  }

  .cat-btn.active {
    background: transparent;
    border-color: #000000;
    color: #000000;
    font-weight: 600;
  }

  .cat-btn.active .cat-count { color: #666; }

  /* ── NEW tab shimmer ── */
  @keyframes new-sweep {
    0%   { background-position: 200% center; }
    100% { background-position: -200% center; }
  }
  .cat-btn.cat-new, .sticky-cat-btn.cat-new {
    background: linear-gradient(
      90deg,
      rgba(219,234,254,0.5) 0%, rgba(219,234,254,0.5) 30%,
      rgba(239,248,255,0.6) 50%,
      rgba(219,234,254,0.5) 70%, rgba(219,234,254,0.5) 100%
    );
    background-size: 300% 100%;
    animation: new-sweep 3s linear infinite;
    border-color: rgba(147,197,253,0.5);
    color: rgba(29,78,216,0.5);
  }
  .cat-btn.cat-new .cat-count,
  .sticky-cat-btn.cat-new .cat-count { color: rgba(96,165,250,0.5); }
  .cat-btn.cat-new.active,
  .sticky-cat-btn.cat-new.active {
    border-color: rgba(29,78,216,0.5);
    color: rgba(29,78,216,0.5);
    font-weight: 600;
  }

  /* ── Results meta ── */
  .results-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    min-height: 24px;
  }

  .results-count {
    font-size: 13px;
    color: var(--text-muted);
  }

  .results-count strong {
    color: var(--text-secondary);
    font-weight: 600;
  }

  /* ── Empty state ── */
  .empty-state {
    display: none;
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state.visible { display: block; }

  .empty-icon {
    font-size: 48px;
    margin-bottom: 16px;
    opacity: 0.4;
  }

  .empty-title {
    font-size: 16px;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .empty-sub {
    font-size: 14px;
  }

  /* ── Terms Grid ── */
  .terms-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 80px;
  }

  .term-card {
    padding: 24px 0;
    position: relative;
    animation: fadeIn 0.2s ease;
    border-bottom: 1px solid var(--border);
  }

  .term-card > * {
    position: relative;
    z-index: 1;
  }

  .term-card:hover {
    background: transparent;
  }
  .term-card::before {
    content: '';
    position: absolute;
    inset: 0 -16px;
    border-radius: 6px;
    background: transparent;
    transition: background 0.15s;
    z-index: 0;
    pointer-events: none;
  }
  .term-card:hover::before { background: #F5F5F3; }

  /* Right column cards — no left border */
  .term-card:nth-child(2n) {
    border-left: none;
  }

  /* Remove bottom border from last two cards */
  .term-card:nth-last-child(1),
  .term-card:nth-last-child(2) {
    border-bottom: none;
  }

  /* Only one item in last row — span both columns */
  .term-card.last-solo {
    grid-column: 1;
    border-left: none;
    border-right: 1px solid var(--border);
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 10px;
  }

  .card-titles { flex: 1; min-width: 0; }

  .term-cn {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3px;
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .term-en {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 400;
    line-height: 1.4;
    word-break: break-word;
  }

  .card-badges {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    height: 22px;
    padding: 0 9px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 500;
    white-space: nowrap;
  }

  .badge-cat {
    background: #EBEBEB;
    color: #1C1B18;
  }

  .badge-custom {
    background: var(--custom-tag);
    color: var(--custom-tag-color);
  }

  .badge-pending {
    background: #FFF8E0;
    color: #996600;
  }

  .card-body { }

  .card-row {
    display: flex;
    gap: 8px;
    margin-top: 8px;
    font-size: 13.5px;
    line-height: 1.65;
  }

  .card-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.5px;
    white-space: nowrap;
    padding-top: 2px;
    text-transform: uppercase;
    min-width: 28px;
  }

  .card-text {
    color: var(--text-secondary);
    flex: 1;
    min-width: 0;
    word-break: break-word;
  }

  .card-text.def { color: var(--text-primary); }

  /* ── Card long-press edit ── */
  .card-actions {
    position: absolute;
    top: 14px;
    right: 14px;
    display: flex;
    gap: 6px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.15s;
  }

  .term-card.long-pressed .card-actions {
    opacity: 1;
    pointer-events: all;
  }

  .btn-edit {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 1.5px solid #D0CFCA;
    background: white;
    color: #1C1B18;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  .btn-edit:hover { background: #F5F5F3; border-color: #999; }

  .btn-delete {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: #FDECEA;
    color: #C0392B;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }

  .btn-delete:hover { background: #F8C8C5; }

  .term-card.long-pressed {
    background: #F7F6F3;
  }

  /* ── FAB ── */
  .fab {
    position: fixed;
    right: 32px;
    bottom: 36px;
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: #FFFFFF;
    color: #1C1B18;
    border: 1.5px solid #D0CFCA;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: all 0.2s;
    z-index: 200;
  }

  .fab:hover {
    background: #F5F5F3;
    box-shadow: 0 6px 24px rgba(0,0,0,0.16);
    transform: scale(1.06);
    border-color: #999;
  }

  .fab:active { transform: scale(0.96); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    backdrop-filter: blur(4px);
    z-index: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--surface);
    border-radius: 20px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    transform: translateY(20px) scale(0.97);
    transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 32px 20px;
    border-bottom: 1px solid var(--border);
  }

  .modal-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text-primary);
  }

  .modal-close {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--bg);
    color: var(--text-muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    transition: all 0.15s;
  }

  .modal-close:hover {
    background: var(--border);
    color: var(--text-primary);
  }

  .modal-body {
    padding: 24px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-group { display: flex; flex-direction: column; gap: 7px; }

  .form-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .form-label .req {
    color: var(--text-primary);
    font-size: 14px;
  }

  .form-input, .form-select, .form-textarea {
    font-family: var(--font-cn);
    font-size: 14px;
    color: var(--text-primary);
    background: var(--bg);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  .form-input::placeholder,
  .form-textarea::placeholder { color: var(--text-muted); }

  .form-input:focus,
  .form-select:focus,
  .form-textarea:focus {
    border-color: #000000;
    background: white;
  }

  .form-input.error,
  .form-select.error,
  .form-textarea.error {
    border-color: #E74C3C;
  }

  .form-textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .modal-footer {
    padding: 0 32px 28px;
    display: flex;
    gap: 10px;
    justify-content: flex-end;
  }

  .btn {
    height: 42px;
    padding: 0 24px;
    border-radius: 100px;
    font-size: 14px;
    font-family: var(--font-cn);
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }

  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-secondary);
  }

  .btn-ghost:hover {
    border-color: var(--text-secondary);
    color: var(--text-primary);
  }

  .btn-primary {
    background: #1C1B18;
    color: white;
  }

  .btn-primary:hover {
    background: #333333;
  }

  .btn-primary:active { transform: scale(0.97); }

  /* ── Highlight match ── */
  mark {
    background: rgba(0,0,0,0.08);
    color: var(--text-primary);
    border-radius: 3px;
    padding: 0 1px;
    font-weight: 600;
  }

  /* ── Sticky Bar ── */
  .sticky-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 150;
    background: #FFFFFF;
    border-bottom: 1px solid var(--border);
    height: 56px;
    transform: translateY(-100%);
    transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    overflow: hidden;
  }

  .sticky-bar.visible {
    transform: translateY(0);
  }

  .sticky-inner {
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
    height: 100%;
    display: flex;
    align-items: center;
    gap: 0;
  }

  /* Category tabs row */
  .sticky-cats {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    min-width: 0;
    padding-right: 4px;
  }
  .sticky-cats::-webkit-scrollbar { display: none; }

  .sticky-cat-btn {
    flex-shrink: 0;
    height: 32px;
    padding: 0 12px;
    border: 1.5px solid var(--border);
    border-radius: 100px;
    font-size: 13px;
    font-family: var(--font-cn);
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    white-space: nowrap;
    transition: border-color 0.15s, color 0.15s, font-weight 0.1s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .sticky-cat-btn .cat-count {
    font-size: 11px;
    color: var(--text-muted);
  }
  .sticky-cat-btn.active {
    border-color: #000000;
    color: var(--text-primary);
    font-weight: 600;
  }
  .sticky-cat-btn.active .cat-count {
    color: var(--text-secondary);
  }

  /* Search icon button */
  .sticky-search-btn {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    border-radius: 100px;
    transition: color 0.15s, background 0.15s;
  }
  .sticky-search-btn:hover {
    color: var(--text-primary);
    background: #F5F5F3;
  }

  /* Expanded search overlay inside sticky bar */
  .sticky-search-expand {
    position: absolute;
    inset: 0;
    background: #FFFFFF;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.18s;
  }
  .sticky-bar.search-open .sticky-search-expand {
    opacity: 1;
    pointer-events: all;
  }

  .sticky-search-icon {
    flex-shrink: 0;
    color: var(--text-muted);
    width: 14px;
    height: 14px;
  }

  .sticky-search-input {
    flex: 1;
    height: 36px;
    border: none;
    border-bottom: 1.5px solid #666666;
    border-radius: 0;
    padding: 0 4px;
    font-size: 14px;
    font-family: var(--font-cn);
    background: transparent;
    color: var(--text-primary);
    outline: none;
    transition: border-color 0.2s;
  }
  .sticky-search-input::placeholder { color: var(--text-muted); }
  .sticky-search-input:focus { border-color: #000000; }

  .sticky-search-close {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    border: none;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    border-radius: 100px;
    transition: color 0.15s, background 0.15s;
  }
  .sticky-search-close:hover {
    color: var(--text-primary);
    background: #F5F5F3;
  }

  @media (max-width: 900px) {
    .sticky-inner { padding: 0 20px; }
  }
  @media (max-width: 700px) {
    .sticky-inner { padding: 0 24px; }
    .sticky-cat-btn { font-size: 12px; padding: 0 10px; }
  }


  .toast {
    position: fixed;
    bottom: 108px;
    right: 32px;
    background: var(--text-primary);
    color: white;
    padding: 12px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    z-index: 400;
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.25s;
    pointer-events: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  .toast.show {
    opacity: 1;
    transform: translateY(0);
  }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .main-content { padding: 0 20px 100px; }
    .page-header { padding: 40px 20px 28px; }
  }

  @media (max-width: 700px) {
    .page-header { padding: 40px 24px 24px; }
    .site-title { font-size: 28px; margin-bottom: 20px; }
    .search-wrap { max-width: 70%; width: 70%; }
    .main-content { padding: 0 24px 100px; }
    .terms-grid { grid-template-columns: 1fr; }
    .term-card:nth-child(2n) { border-left: none; }
    .term-card { padding: 20px 0; }
    .term-cn { font-size: 16px; }
    .fab { right: 20px; bottom: 24px; width: 50px; height: 50px; font-size: 22px; }
    .modal { border-radius: 16px; }
    .modal-header { padding: 22px 20px 16px; }
    .modal-body { padding: 20px 20px 24px; }
    .modal-footer { padding: 0 20px 22px; }
    .form-row { grid-template-columns: 1fr; }
  }

  @media (max-width: 480px) {
    .cat-btn { font-size: 12px; padding: 0 12px; }
    .toast { right: 16px; bottom: 90px; }
  }

  /* ── Particle Background ── */
  .hero-section {
    position: relative;
    overflow: visible;
  }

  #particleCanvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    pointer-events: none;
    z-index: 0;
    -webkit-mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
    mask-image: linear-gradient(to bottom, black 55%, transparent 100%);
  }

  .page-header {
    position: relative;
    z-index: 1;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<!-- Sticky Bar -->
<div class="sticky-bar" id="stickyBar">
  <div class="sticky-inner">
    <div class="sticky-cats" id="stickyCats"></div>
    <button class="sticky-search-btn" id="stickySearchBtn" aria-label="搜索">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="8.5" cy="8.5" r="5.5"/>
        <path d="M15 15l-3-3" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <div class="sticky-search-expand" id="stickySearchExpand">
    <div class="sticky-inner">
      <svg class="sticky-search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="8.5" cy="8.5" r="5.5"/>
        <path d="M15 15l-3-3" stroke-linecap="round"/>
      </svg>
      <input class="sticky-search-input" id="stickySearchInput" type="text" placeholder="搜索中文名或英文名…" autocomplete="off">
      <button class="sticky-search-close" id="stickySearchClose" aria-label="关闭搜索">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M2 2l10 10M12 2L2 12"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<!-- Page Header -->
<div class="hero-section">
  <canvas id="particleCanvas"></canvas>
  <div class="page-header">
  <h1 class="site-title">Marketing Terms Glossary</h1>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
      <circle cx="8.5" cy="8.5" r="5.5"/>
      <path d="M15 15l-3-3" stroke-linecap="round"/>
    </svg>
    <input class="search-input" id="searchInput" type="text" placeholder="搜索中文名或英文名…" autocomplete="off">
    <button class="search-clear" id="searchClear" aria-label="清空搜索">×</button>
  </div>
</div>
</div>

<!-- Main -->
<main class="main-content">
  <!-- Category tabs -->
  <nav class="category-nav" id="categoryNav" aria-label="分类筛选"></nav>

  <!-- Loading state -->
  <div id="loadingState" style="text-align:center;padding:80px 20px;color:#9E9C97;font-size:14px;">加载中…</div>
  <!-- Terms grid -->
  <div class="terms-grid" id="termsGrid"></div>

  <!-- Empty state -->
  <div class="empty-state" id="emptyState">
    <div class="empty-icon">🔍</div>
    <div class="empty-title">没有找到匹配的词汇</div>
    <div class="empty-sub">试试其他关键词，或切换到其他分类</div>
  </div>
</main>

<!-- FAB -->
<button class="fab" id="fabBtn" aria-label="新增词汇" title="新增词汇">
  <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="#1C1B18" stroke-width="2.2" stroke-linecap="round">
    <path d="M11 4v14M4 11h14"/>
  </svg>
</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle">新增词汇</div>
      <button class="modal-close" id="modalClose" aria-label="关闭">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M1 1l12 12M13 1L1 13"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="f_cn">中文名称 <span class="req">*</span></label>
          <input class="form-input" id="f_cn" type="text" placeholder="例：私域流量">
        </div>
        <div class="form-group">
          <label class="form-label" for="f_en">英文名称 <span class="req">*</span></label>
          <input class="form-input" id="f_en" type="text" placeholder="例：Private Traffic">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label" for="f_cat">分类归属 <span class="req">*</span></label>
        <select class="form-select" id="f_cat">
          <option value="">— 选择分类 —</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label" for="f_def">定义 / 解释 <span class="req">*</span></label>
        <textarea class="form-textarea" id="f_def" placeholder="请简明描述这个词汇的含义…" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="f_ex">场景 / 例句 <span class="req">*</span></label>
        <textarea class="form-textarea" id="f_ex" placeholder="请提供一个使用场景或示例句子…" rows="2"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label" for="f_contributor">贡献者 <span class="req">*</span></label>
        <input class="form-input" id="f_contributor" type="text" placeholder="请输入你的名字或昵称">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="modalCancel">取消</button>
      <button class="btn btn-primary" id="modalSubmit">添加词汇</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
